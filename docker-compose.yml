version: '3.8'

services:
  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - '3000:3000'

  frontend:
    build: ./frontend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - '3001:3000'
    depends_on:
      - backend
